<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskr — do the thing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="todo-style.css" />
</head>
<body>

  <!-- top bar -->
  <header id="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <span class="app-logo">taskr<span class="logo-dot">.</span></span>
        <span class="app-sub" id="greeting">good morning.</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="themeToggle" title="toggle theme" aria-label="Toggle theme">
          <span class="theme-icon">◑</span>
        </button>
      </div>
    </div>
  </header>

  <!-- main wrapper -->
  <main>
    <div class="layout">

      <!-- left col: input + filters -->
      <aside class="sidebar">

        <div class="date-block">
          <span class="date-day" id="dateDay"></span>
          <span class="date-full" id="dateFull"></span>
        </div>

        <!-- progress ring -->
        <div class="progress-wrap">
          <svg class="ring-svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ring-bg"   cx="50" cy="50" r="40" />
            <circle class="ring-fill" cx="50" cy="50" r="40" id="ringFill" />
          </svg>
          <div class="ring-label">
            <span class="ring-pct" id="ringPct">0%</span>
            <span class="ring-sub">done</span>
          </div>
        </div>

        <div class="summary-chips">
          <div class="chip" id="chipTotal">
            <span class="chip-n" id="totalN">0</span>
            <span class="chip-l">total</span>
          </div>
          <div class="chip active" id="chipLeft">
            <span class="chip-n" id="leftN">0</span>
            <span class="chip-l">left</span>
          </div>
          <div class="chip done" id="chipDone">
            <span class="chip-n" id="doneN">0</span>
            <span class="chip-l">done</span>
          </div>
        </div>

        <!-- filter buttons -->
        <div class="filter-group" role="group" aria-label="Filter tasks">
          <button class="filter-btn active" data-filter="all">all</button>
          <button class="filter-btn" data-filter="active">active</button>
          <button class="filter-btn" data-filter="completed">done</button>
        </div>

        <!-- category filter -->
        <div class="cat-filter">
          <p class="cat-filter-label">category</p>
          <div class="cat-pills" id="catPills">
            <button class="cat-pill active" data-cat="all">all</button>
            <button class="cat-pill" data-cat="work">work</button>
            <button class="cat-pill" data-cat="personal">personal</button>
            <button class="cat-pill" data-cat="learning">learning</button>
            <button class="cat-pill" data-cat="health">health</button>
          </div>
        </div>

        <div class="sidebar-actions">
          <button class="action-btn" id="clearDone">clear done</button>
          <button class="action-btn danger" id="clearAll">clear all</button>
        </div>

      </aside>

      <!-- right col: input + list -->
      <section class="content">

        <!-- input card -->
        <div class="input-card" id="inputCard">
          <div class="input-row">
            <input
              type="text"
              id="taskInput"
              class="task-input"
              placeholder="what needs doing..."
              maxlength="140"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="add-btn" id="addBtn" aria-label="Add task">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="input-meta">
            <div class="meta-left">
              <select class="meta-select" id="catSelect" aria-label="Category">
                <option value="work">💼 work</option>
                <option value="personal">🏠 personal</option>
                <option value="learning">📚 learning</option>
                <option value="health">💪 health</option>
              </select>
              <select class="meta-select" id="priSelect" aria-label="Priority">
                <option value="normal">— normal</option>
                <option value="high">↑ high</option>
                <option value="low">↓ low</option>
              </select>
            </div>
            <span class="char-count" id="charCount">0 / 140</span>
          </div>
        </div>

        <!-- task list -->
        <div class="list-header" id="listHeader">
          <span class="list-title" id="listTitle">all tasks</span>
          <span class="list-sort">
            <button class="sort-btn active" data-sort="created">newest</button>
            <button class="sort-btn" data-sort="priority">priority</button>
          </span>
        </div>

        <ul class="task-list" id="taskList" role="list" aria-live="polite" aria-label="Task list">
          <!-- tasks injected by JS -->
        </ul>

        <!-- empty state -->
        <div class="empty-state" id="emptyState" hidden>
          <p class="empty-icon" id="emptyIcon">✦</p>
          <p class="empty-title" id="emptyTitle">nothing here</p>
          <p class="empty-sub"  id="emptySub">add a task above to get going</p>
        </div>

      </section>
    </div>
  </main>

  <!-- inline edit modal (hidden by default) -->
  <div class="modal-overlay" id="modalOverlay" hidden aria-modal="true" role="dialog">
    <div class="modal-card">
      <p class="modal-label">edit task</p>
      <input type="text" class="modal-input" id="modalInput" maxlength="140" />
      <div class="modal-actions">
        <button class="modal-save" id="modalSave">save</button>
        <button class="modal-cancel" id="modalCancel">cancel</button>
      </div>
    </div>
  </div>

  <script src="todo-script.js"></script>
</body>
</html>
